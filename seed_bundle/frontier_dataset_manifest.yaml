version: "2026-05-11"
reviewed_at: "2026-05-11"
strategy: frontier

policy:
  default_mode: manifest_only
  runpod_default_downloads_datasets: false
  runpod_note: >
    Frontier model bootstrap may download model weights, but training datasets and
    paper corpora are never downloaded on a normal ephemeral Pod. Dataset pulls are
    explicit local-data-lab actions and must be planned before execution.
  local_cache_root: local_data_lab/cache/frontier_datasets
  planner_output_root: local_data_lab/runs/frontier_dataset_plans
  allow_dataset_download: explicit_only
  license_gate_required: true
  network_volume_baseline: false
  runpod_gpu_server: RTX PRO 6000
  runpod_gpu_vram: 96GB
  container_disk_gb: 80
  volume_disk_default_gb: 400
  volume_disk_full_frontier_qwen_gb: 500
  persistent_model_cache: false
  long_term_outputs: external_or_local_only

tasks:
  raw_merge_denoise:
    label: RAW burst merge, HDR, denoise, restoration
    acceptance_focus:
      - 3-frame RAW baseline must keep a better diagnostic trail than the old TriRaw preview path.
      - 9-frame burst/HDR planning stays open for NTIRE-style research candidates.
      - Export merged HDR, denoised result, confidence map, ghost map, and alignment evidence.
      - Keep truth-preserving restoration as the default delivery target.
      - Treat aggressive denoise/deblur/detail reconstruction as a reviewed candidate because it can hallucinate texture.
  photo_correction_retouch:
    label: Photo correction, retouch, finish, preference scoring
    acceptance_focus:
      - Prefer human-region and XMP/style metadata when available.
      - Preserve pairwise compare signals for Studio winner selection.
  background_removal_matting:
    label: Background removal, matting, subject masks
    acceptance_focus:
      - Track mask boundary quality separately from coarse object IoU.
      - Keep license-gated and generated-mask corpora out of automatic bootstrap.
  background_generation_replace:
    label: Background generation, replacement, composition
    acceptance_focus:
      - Evaluate subject preservation, instruction adherence, lighting consistency, and collateral edits.
      - Prefer datasets with masks, edit pairs, or scene labels that map to Studio operations.
  inpaint_outpaint:
    label: Inpaint, outpaint, object removal, hole filling
    acceptance_focus:
      - Track mask distributions and large-hole behavior.
      - Combine edit benchmarks with scene-background corpora for regression prompts.

task_defaults:
  raw_merge_denoise:
    - ntire_burst_hdr_2025
    - rasd_burst_hdr_2025
    - rawfusion_burst_hdr
    - bracketire_ireanet
    - rawir
    - sidd
    - sid
  photo_correction_retouch:
    - fivek
    - acceptable_adjustments
    - ppr10k
    - mmart_ppr10k
    - dear
    - edithf_1m
  background_removal_matting:
    - dis5k
    - birefnet_dis5k
    - sa1b
    - coco_stuff_164k
    - ade20k
    - bria_rmbg_model_card
  background_generation_replace:
    - imgedit
    - editbench
    - magicbrush
    - coco_stuff_164k
    - ade20k
    - places2
  inpaint_outpaint:
    - lama_places_openimages_masks
    - places2
    - coco_stuff_164k
    - editbench
    - imgedit

datasets:
  ntire_burst_hdr_2025:
    label: NTIRE 2025 Efficient Burst HDR and Restoration
    tasks:
      - raw_merge_denoise
    kind: raw_burst_hdr_challenge
    readiness: frontier_eval_default
    integration_status: workflow_needed
    availability: paper_challenge
    download_mode: challenge_registration
    runpod_default_download: false
    local_cache_subdir: raw/ntire_burst_hdr_2025
    license_note: Challenge dataset terms and access path must be checked before download or training.
    use_in_dreamcatcher: >
      Main research anchor for tri_raw_frontier_v1 9-frame RAW burst HDR, denoise,
      alignment, ghost evidence, and efficiency constraints.
    scale_note: Nine noisy, misaligned RAW frames with varied exposures per scene.
    references:
      - https://arxiv.org/abs/2505.12089

  rasd_burst_hdr_2025:
    label: RASD - Recursive Multi-Exposure Alignment with Spatiotemporal Decoupling
    tasks:
      - raw_merge_denoise
    kind: raw_burst_hdr_method
    readiness: training_candidate
    integration_status: workflow_needed
    availability: cvprw_paper
    download_mode: metadata_only
    runpod_default_download: false
    local_cache_subdir: raw/rasd_burst_hdr_2025
    license_note: Paper/code availability must be reviewed before weights or training assets are used.
    use_in_dreamcatcher: >
      Tracks flow-guided multi-exposure alignment and staged alignment/restoration
      training as the first serious upgrade path beyond tri_raw_baseline_v1.
    references:
      - https://openaccess.thecvf.com/content/CVPR2025W/NTIRE/html/Qiu_Recursive_Multi-Exposure_Alignment_with_Spatiotemporal_Decoupling_for_Efficient_Burst_HDR_CVPRW_2025_paper.html

  rawfusion_burst_hdr:
    label: RawFusion / Efficient Burst HDR and Restoration repo
    tasks:
