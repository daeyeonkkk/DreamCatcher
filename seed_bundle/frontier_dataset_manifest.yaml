    kind: bracket_raw_restoration
    readiness: training_candidate
    integration_status: workflow_needed
    availability: paper
    download_mode: metadata_only
    runpod_default_download: false
    local_cache_subdir: raw/bracketire_ireanet
    license_note: Dataset and code access must be checked from the paper/project release before use.
    use_in_dreamcatcher: >
