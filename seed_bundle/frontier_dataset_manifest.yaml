eval_tracks:
  raw_frontier_smoke:
    tasks:
      - raw_merge_denoise
    required_evidence:
      - merged_hdr_path
      - denoised_result_path
      - confidence_map_path
      - ghost_map_path
      - alignment_evidence_path
      - model_or_research_ref
    metrics:
      - raw_alignment_confidence
      - ghost_area_ratio
      - noise_reduction_vs_detail_hold
      - highlight_recovery_delta
      - export_contract_complete
      - frontier_total_score
      - frontier_score_delta_vs_baseline
      - frontier_eval_decision

  background_removal_smoke:
    tasks:
      - background_removal_matting
    required_evidence:
      - input_image
      - alpha_or_mask
      - boundary_overlay
      - cutout_preview
      - license_gate_status
    metrics:
      - mask_iou
      - boundary_f_score
      - subject_hole_rate
      - hair_or_fine_detail_flag

  background_generation_smoke:
    tasks:
      - background_generation_replace
      - inpaint_outpaint
    required_evidence:
      - source_image
      - source_mask
      - prompt
      - generated_result
      - subject_preservation_compare
    metrics:
      - instruction_adherence
      - subject_identity_preservation
      - lighting_consistency
      - collateral_edit_area

  photo_correction_smoke:
    tasks:
      - photo_correction_retouch
    required_evidence:
      - before_image
      - after_image
      - compare_decision
      - retouch_metadata_or_prompt
    metrics:
      - exposure_delta_reasonable
      - color_cast_delta
      - human_region_preservation
      - preference_score
