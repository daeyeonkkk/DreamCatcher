    kind: raw_burst_hdr_research_repo
    readiness: training_candidate
    integration_status: workflow_needed
    availability: public_repo
    download_mode: git_clone
    runpod_default_download: false
    local_cache_subdir: raw/rawfusion
    license_note: Review repository license and competition factsheet before importing code or model outputs.
    use_in_dreamcatcher: >
      Candidate implementation reference for loaders, evaluation scripts, and burst HDR
      scoring around 9-frame RAW input.
    adapter_contract:
      adapter_id: rawfusion_unet_external_v1
      enable_env: DC_TRIRAW_LEARNED_ADAPTER=rawfusion
      required_env:
        - DC_RAWFUSION_REPO
        - DC_RAWFUSION_CKPT
      supported_input: 9 TIFF RAW frames
      release_bundle_policy: external_code_and_checkpoint_not_vendored
    download:
      git_url: https://github.com/Eve-ctr/RawFusion.git
    references:
      - https://github.com/Eve-ctr/RawFusion

  bracketire_ireanet:
