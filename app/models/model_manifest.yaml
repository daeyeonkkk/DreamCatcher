raw_frontier:
  contract_id: tri_raw_frontier_v1
  baseline_backend: tri_raw_baseline_v1
  studio_official_inputs: [single_raw, three_raw_bracket]
  accepted_frame_counts: [3, 9]
  nine_frame_status: research_api_benchmark_path
  restoration_goals:
    default: truth_preserving
    options:
      - id: truth_preserving
        label: 진실 보존
        summary: 실제 프레임 근거를 우선해 고스팅과 과한 질감 생성을 낮춥니다.
        approval: default_delivery_path
      - id: aggressive_restore
        label: 공격적 복원 후보
        summary: 고스트와 노이즈 근거를 보며 더 강한 디테일 후보를 만듭니다. 최종 채택 전 검수가 필요합니다.
        approval: qwen_metric_golden_human_review_required
        risk: hallucinated_detail_or_over_sharpened_texture
  min_vram_class: 80GB
  integration_status: research_spike
  research_refs:
    - https://arxiv.org/abs/2505.12089
    - https://openaccess.thecvf.com/content/CVPR2025W/NTIRE/html/Qiu_Recursive_Multi-Exposure_Alignment_with_Spatiotemporal_Decoupling_for_Efficient_Burst_HDR_CVPRW_2025_paper.html
    - https://github.com/Eve-ctr/RawFusion
    - https://arxiv.org/abs/2404.10358
  data_refs:
    - name: NTIRE 2025 Efficient Burst HDR and Restoration
      use: eval_and_future_training
      access: challenge_dataset
      status: manifest_only
    - name: RAWIR / NTIRE RAW Image Restoration
      use: denoise_restoration_eval
      access: public_hf_dataset
      status: manifest_only
    - name: BracketIRE
      use: three_frame_bracket_eval
      access: paper_dataset
      status: manifest_only
