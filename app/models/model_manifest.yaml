model_strategy:
  default_profile: frontier
  summary: Single aggressive Frontier Studio stack with no alternate product profiles.
  bootstrap_scope: Full Frontier downloads executable Comfy/model sets by default; research data and unverified adapters stay explicit.
  min_vram_class: 48GB
  runpod_gpu_server: RTX PRO 6000
  runpod_gpu_vram: 96GB
  container_disk_gb: 80
  volume_disk_default_gb: 400
  volume_disk_full_frontier_qwen_gb: 500
  network_volume_baseline: false
  persistent_model_cache: false
  raw_research_vram_class: 80GB
  requires_hf_token: true
  license_note: HF token must have accepted upstream gated licenses, especially BFL FLUX paths.

quality_automation:
  version: quality_automation_v2
  tuning_version: quality_tuning_loop_v1
  qwen_judge_schema_version: qwen_judge_signal_v2
  qwen_judge_schema_path: seed_bundle/runtime_priors/evaluator/qwen_judge_signal_v2.schema.json
  judge_evidence_packet_version: judge_evidence_packet_v1
  judge_evidence_packet_schema_path: seed_bundle/runtime_priors/evaluator/judge_evidence_packet_v1.schema.json
  golden_calibration_version: golden_calibration_v1
  golden_calibration_schema_path: seed_bundle/runtime_priors/evaluator/golden_calibration_v1.schema.json
  golden_calibration_seed_path: seed_bundle/runtime_priors/evaluator/golden_quality_calibration.seed.json
  primary_local_model: Qwen3.6-35B-A3B-FP8
  primary_local_repo: Qwen/Qwen3.6-35B-A3B-FP8
  primary_local_revision: 61a5771f218894aaacf97551e24a25b866750fc2
  primary_local_path: models/qwen_judge/Qwen3.6-35B-A3B-FP8
  serving: local_openai_compatible_vllm
  cloud_fallback_enabled: false
  verdicts: [fail, suspicious, pass]
  layers:
    - qwen_vlm_judge
    - metric_checker_layer
    - judge_evidence_packet
    - golden_session_runner
    - golden_score_calibration
    - human_approval_memory
  qwen_input_evidence:
    required:
      - deterministic_metrics
      - golden_context
    optional_task_specific:
      - operation_context
      - mask_evidence
      - raw_evidence
      - workflow_evidence
      - user_preference_evidence
  qwen_response_contract:
    required_keys:
      - schema_version
      - verdict
      - confidence
      - axis_scores
      - failure_tags
      - localized_issues
      - correction_plan
      - rationale
      - retry_instruction
      - work_instruction
    axis_scores:
      - intent_match
      - technical_quality
      - aesthetic_quality
      - subject_preservation
      - mask_boundary
      - color_naturalness
    correction_plan_fields:
      - exposure_delta
      - contrast_delta
      - shadow_delta
      - highlight_delta
      - temperature_delta
      - tint_delta
      - saturation_delta
      - denoise_strength
      - edit_strength
      - crop_box_norm
      - notes
  code_tuning_policy: proposal_only_human_approval_required
  blocked_automatic_actions:
    - auto_apply_code_change
    - auto_replace_workflow
    - auto_change_metric_threshold
    - auto_release_after_tuning

